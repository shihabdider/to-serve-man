name: Deploy to GitHub Pages

# Publishing is intentionally deferred while the repository is private.
# Re-enable the push trigger when GitHub Pages publication is approved.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Verify, build, and upload static site
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: npm
          build-cmd: npm run verify

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v5
